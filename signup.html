<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <nav>
        <h1>Colmena Code</h1> 
        <!-- esto se cambia por el nav de la pagian principal  -->
    </nav>
    <main>
        
        <form>
            <section class="login-box">
            <h2 class="signup-title">Registro de Usuario</h2>

            <label for="name">Nombre:</label>
            <input type="text" id="name" name="name" placeholder="tu nombre" required>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="tu correo electrónico" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="crea una contraseña">

            <button type="submit">Registrarse</button>
            </section>
    </main>
    <script>
        document.querySelector('form').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita el envío del formulario

            // Aquí puedes agregar la lógica para manejar el registro del usuario
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            alert('Registro exitoso para: ' + name);

            console.log('Nombre:', name);
            console.log('Correo Electrónico:', email);
            console.log('Contraseña:', password);

            // Puedes agregar validaciones adicionales o enviar los datos a un servidor aquí
        });
    </script>
</body>
</html>
